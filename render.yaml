services:
  - type: web
    name: re-assistant-backend
    runtime: python3
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
